function AMark({ size = 72, fg = '#0E0E0C', accent = 'oklch(0.68 0.15 148)' }) {
  return (
    <div style={{
      width: size, height: size, flexShrink: 0,
      border: '1.5px solid ' + fg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative', fontFamily: '"Inter Tight", sans-serif',
      fontWeight: 600, fontSize: size * 0.5, lineHeight: 1, color: fg,
    }}>
      <span style={{ position: 'relative', top: size * 0.02 }}>A</span>
      <span style={{ position: 'absolute', bottom: -1, left: -1, width: 10, height: 10, borderLeft: '1.5px solid ' + accent, borderBottom: '1.5px solid ' + accent }} />
      <span style={{ position: 'absolute', top: -1, right: -1, width: 10, height: 10, borderRight: '1.5px solid ' + accent, borderTop: '1.5px solid ' + accent }} />
    </div>
  );
}

function LiveDot({ color }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
      <span style={{ position: 'relative', width: 7, height: 7, display: 'inline-block' }}>
        <span style={{ position: 'absolute', inset: 0, borderRadius: 4, background: color }} />
      </span>
    </span>
  );
}

function LiveClock({ color }) {
  const [t, setT] = React.useState(function() { return new Date().toLocaleTimeString('en-GB', { hour12: false }); });
  React.useEffect(function() {
    var i = setInterval(function() { setT(new Date().toLocaleTimeString('en-GB', { hour12: false })); }, 1000);
    return function() { clearInterval(i); };
  }, []);
  return <span style={{ color: color, fontVariantNumeric: 'tabular-nums' }}>{t}</span>;
}

function Anim({ children, variant, delay, distance, style }) {
  var ref = React.useRef(null);
  React.useEffect(function() {
    var el = ref.current;
    if (!el) return;
    el.style.opacity = '1';
    el.style.transform = 'translate3d(0,0,0) scale(1)';
  }, []);
  return <div ref={ref} style={style}>{children}</div>;
}

function HeroHeadline({ lines, color, mutedColor, accent }) {
  var refs = React.useRef([]);
  React.useEffect(function() {
    var nodes = refs.current.filter(Boolean);
    nodes.forEach(function(n, i) {
      n.style.opacity = '0';
      n.style.transform = 'translate3d(0,80px,0)';
      n.style.transition = 'opacity 1s cubic-bezier(.2,.7,.2,1) ' + (i * 120) + 'ms, transform 1.1s cubic-bezier(.2,.7,.2,1) ' + (i * 120) + 'ms';
      n.style.willChange = 'transform, opacity';
    });
    var timer = setTimeout(function() {
      nodes.forEach(function(n) { n.style.opacity = '1'; n.style.transform = 'translate3d(0,0,0)'; });
    }, 60);
    return function() { clearTimeout(timer); };
  }, [lines.length]);

  return (
    <h1 style={{ fontSize: 'clamp(40px,6.5vw,96px)', lineHeight: 1.02, letterSpacing: '-0.035em', fontWeight: 500, margin: 0, maxWidth: 1100, color: color }}>
      {lines.map(function(ln, i) {
        var isObj = typeof ln === 'object';
        var text = isObj ? ln.text : ln;
        var isMuted = isObj && ln.muted;
        var isLast = i === lines.length - 1;
        return (
          <div key={i} style={{ overflow: 'hidden' }}>
            <span ref={function(el) { refs.current[i] = el; }} style={{ display: 'inline-block', color: isMuted ? mutedColor : color, position: 'relative' }}>
              {text}
              {isLast && (
                <svg style={{ position: 'absolute', left: 0, bottom: '-0.1em', width: '100%', height: 14 }} viewBox="0 0 400 14" preserveAspectRatio="none">
                  <path d="M2 8 Q200 2 398 8" stroke={accent} strokeWidth="2.5" fill="none" strokeLinecap="round" />
                </svg>
              )}
            </span>
          </div>
        );
      })}
    </h1>
  );
}

function ScrollProgress({ scrollRef, accent }) {
  var barRef = React.useRef(null);
  React.useEffect(function() {
    var scroller = scrollRef.current;
    if (!scroller || !barRef.current) return;
    var rafId = 0;
    var onScroll = function() {
      if (rafId) return;
      rafId = requestAnimationFrame(function() {
        rafId = 0;
        var p = scroller.scrollTop / Math.max(1, scroller.scrollHeight - scroller.clientHeight);
        if (barRef.current) barRef.current.style.transform = 'scaleX(' + p + ')';
      });
    };
    scroller.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return function() { scroller.removeEventListener('scroll', onScroll); if (rafId) cancelAnimationFrame(rafId); };
  }, [scrollRef]);
  return (
    <div style={{ position: 'fixed', top: 0, left: 0, right: 0, height: 2, zIndex: 50, pointerEvents: 'none' }}>
      <div ref={barRef} style={{ height: '100%', background: accent, transformOrigin: '0 50%', transform: 'scaleX(0)', willChange: 'transform' }} />
    </div>
  );
}

        {game.media.map(function(image) {
          return <img key={image.src} src={image.src} alt={image.alt} loading="lazy" decoding="async" width={image.width} height={image.height} />;
        })}

        <div className="v2-game-title">
